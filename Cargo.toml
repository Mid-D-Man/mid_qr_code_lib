[workspace]
members = [
    "crates/mid-qr-core",
    "crates/mid-qr-wasm",
]
resolver = "2"

[workspace.package]
version    = "0.1.0"
edition    = "2021"
authors    = ["Mid-D-Man"]
license    = "MIT"
repository = "https://github.com/Mid-D-Man/mid-qr"

# ── Release profile ───────────────────────────────────────────────────────────
# Note: wasm-opt flags are set per-crate in each crate's
# [package.metadata.wasm-pack.profile.release] section.
# The --enable-bulk-memory flag is required because rxing and encoding_rs
# emit memory.fill / memory.copy (bulk-memory-operations proposal).
# These instructions are supported by all browsers since 2021 and are
# generated by rustc for wasm32-unknown-unknown by default.
[profile.release]
opt-level     = "s"
lto           = true
codegen-units = 1
panic         = "abort"
strip         = true
