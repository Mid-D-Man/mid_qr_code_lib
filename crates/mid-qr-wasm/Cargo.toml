[package]
name        = "mid-qr-wasm"
version.workspace = true
edition.workspace = true
description = "WASM bindings for mid-qr"

[lib]
crate-type = ["cdylib"]

[features]
default  = ["generate", "decode"]
generate = ["mid-qr-core/generate"]
decode   = ["mid-qr-core/decode"]
debug    = ["dep:console_error_panic_hook"]

[dependencies]
mid-qr-core              = { path = "../mid-qr-core" }
wasm-bindgen             = "0.2"
js-sys                   = "0.3"
serde                    = { version = "1", features = ["derive"] }
serde-wasm-bindgen       = "0.6"
console_error_panic_hook = { version = "0.1", optional = true }

[package.metadata.wasm-pack.profile.release]
wasm-opt = ["-Oz"]
