name: Build WASM + assemble dist

on:
  push:
    branches: [ main, master ]
    paths:
      - 'crates/**'
      - 'npm/**'
      - 'wrappers/blazor/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
  workflow_dispatch:
  workflow_call:
    outputs:
      dist-sha:
        description: "SHA of the dist branch commit"
        value: ${{ jobs.build.outputs.dist-sha }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    outputs:
      dist-sha: ${{ steps.push-dist.outputs.sha }}

    steps:
      # ── Checkout ─────────────────────────────────────────────────────────────
      - name: Checkout source
        uses: actions/checkout@v4

      # ── Rust toolchain ────────────────────────────────────────────────────────
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      # ── wasm-pack ─────────────────────────────────────────────────────────────
      - name: Install wasm-pack
        run: |
          curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      # ── Rust cache ────────────────────────────────────────────────────────────
      - name: Cache Rust build artefacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      # ── Unit tests (native — fast, full output) ───────────────────────────────
      - name: Run mid-qr-core tests
        run: cargo test -p mid-qr-core --features generate,decode

      # ── Build WASM ────────────────────────────────────────────────────────────
      # wasm-opt flags are read from
      # crates/mid-qr-wasm/Cargo.toml →
      #   [package.metadata.wasm-pack.profile.release]
      #   wasm-opt = ["-Oz", "--enable-bulk-memory"]
      #
      # --enable-bulk-memory is required because rxing + encoding_rs emit
      # memory.fill / memory.copy (bulk-memory-operations proposal).
      # These are supported by all modern browsers since 2021 and are
      # generated by rustc for wasm32-unknown-unknown by default.
      # The flag makes wasm-opt accept them instead of failing validation.
      - name: Build WASM (release, web target)
        run: |
          wasm-pack build crates/mid-qr-wasm \
            --target web \
            --release \
            --out-dir ../../npm/wasm \
            --out-name mid_qr_wasm

      # ── Verify WASM output ────────────────────────────────────────────────────
      - name: Verify WASM artefacts exist
        run: |
          for f in npm/wasm/mid_qr_wasm_bg.wasm \
                   npm/wasm/mid_qr_wasm.js \
                   npm/wasm/mid_qr_wasm.d.ts; do
            if [ ! -f "$f" ]; then
              echo "::error::Missing expected WASM artefact: $f"
              exit 1
            fi
            echo "✓ $f ($(du -sh "$f" | cut -f1))"
          done

      # ── Copy WASM to Blazor wwwroot ───────────────────────────────────────────
      - name: Copy WASM → Blazor wwwroot
        run: |
          mkdir -p wrappers/blazor/wwwroot/wasm
          cp npm/wasm/mid_qr_wasm_bg.wasm  wrappers/blazor/wwwroot/wasm/
          cp npm/wasm/mid_qr_wasm.js       wrappers/blazor/wwwroot/wasm/
          cp npm/wasm/mid_qr_wasm.d.ts     wrappers/blazor/wwwroot/wasm/
          echo "✓ WASM copied to Blazor wwwroot"

      # ── Fetch nimiq scanner files ─────────────────────────────────────────────
      - name: Fetch nimiq scanner files
        run: |
          NIMIQ_BASE="https://raw.githubusercontent.com/nimiq/qr-scanner/master"

          mkdir -p npm/src/worker
          for f in qr-scanner.min.js qr-scanner-worker.min.js; do
            TARGET="npm/src/worker/$f"
            if [ ! -f "$TARGET" ]; then
              curl -fsSL "$NIMIQ_BASE/$f" -o "$TARGET"
              echo "✓ fetched $TARGET"
            else
              echo "  exists: $TARGET"
            fi
          done

          mkdir -p wrappers/blazor/wwwroot/js/worker
          for f in qr-scanner.min.js qr-scanner-worker.min.js; do
            cp "npm/src/worker/$f" "wrappers/blazor/wwwroot/js/worker/$f"
            echo "✓ copied to blazor wwwroot: $f"
          done

      # ── Node.js ───────────────────────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: npm/package-lock.json

      - name: Install npm dependencies
        working-directory: npm
        run: npm ci

      # ── Build TypeScript ──────────────────────────────────────────────────────
      - name: Build TypeScript → dist/
        working-directory: npm
        run: npm run build:ts

      # ── Verify TS output ──────────────────────────────────────────────────────
      - name: Verify TS build output
        run: |
          for f in npm/dist/index.js npm/dist/index.d.ts; do
            if [ ! -f "$f" ]; then
              echo "::error::Missing expected TS artefact: $f"
              exit 1
            fi
            echo "✓ $f"
          done

      # ── Assemble dist tree ────────────────────────────────────────────────────
      # Layout:
      #   dist/
      #     npm/          ← full npm package (dist/ + wasm/ + package.json + worker/)
      #     blazor/       ← Blazor wwwroot additions
      #     test/         ← GitHub Pages test app
      - name: Assemble dist directory
        run: |
          rm -rf dist-out
          mkdir -p dist-out/npm/worker dist-out/blazor dist-out/test

          # npm package files
          cp -r npm/dist       dist-out/npm/dist
          cp -r npm/wasm       dist-out/npm/wasm
          cp    npm/package.json dist-out/npm/

          # nimiq worker files — consumers need these alongside the JS bundle
          cp npm/src/worker/qr-scanner.min.js          dist-out/npm/worker/
          cp npm/src/worker/qr-scanner-worker.min.js   dist-out/npm/worker/

          # Blazor additions
          cp -r wrappers/blazor/wwwroot/wasm dist-out/blazor/wasm
          cp -r wrappers/blazor/wwwroot/js   dist-out/blazor/js

          # Test / GitHub Pages app
          cp -r test/. dist-out/test/

          echo "✓ dist tree assembled"
          find dist-out -type f | sort

      # ── Push to dist branch ───────────────────────────────────────────────────
      - name: Push dist branch
        id: push-dist
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git fetch origin dist 2>/dev/null || true
          git checkout --orphan dist-tmp

          git rm -rf . --quiet 2>/dev/null || true
          cp -r dist-out/. .
          rm -rf dist-out

          cat > README.md << 'EOF'
          # mid-qr — dist branch

          Built artefacts — do not edit manually.
          Source is on the `main` branch.

          ## Install via npm

```bash
          npm install github:Mid-D-Man/mid-qr#dist
```

          ## Blazor

          Copy `blazor/wasm/` → `wwwroot/wasm/`
          Copy `blazor/js/`   → `wwwroot/js/`

          ## Test app

          Live at: https://mid-d-man.github.io/mid-qr/
          EOF

          git add .
          if git diff --staged --quiet; then
            echo "nothing changed — dist branch already up to date"
            exit 0
          fi

          git commit -m "chore: dist build $(date -u '+%Y-%m-%dT%H:%M:%SZ') [skip ci]"
          git push origin HEAD:dist --force

          SHA=$(git rev-parse HEAD)
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"
          echo "✓ dist branch updated — $SHA"
