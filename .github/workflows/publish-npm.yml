# =============================================================================
# publish-npm.yml
#
# Publishes the mid-qr npm package on every v* tag push.
#
# Steps
# ─────
# 1. Verify package.json version matches the tag
# 2. Build WASM + assemble dist (reuses build-wasm.yml)
# 3. Publish from npm/ directory
#
# Required secret: NPM_TOKEN
#   npmjs.com → Account → Access Tokens → Automation token
# =============================================================================

name: Publish to npm

on:
  push:
    tags:
      - 'v[0-9]*'

jobs:
  # ── Version guard ────────────────────────────────────────────────────────────
  guard:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: ver
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Publishing: $VERSION"

      - name: Verify package.json matches tag
        run: |
          PKG=$(node -p "require('./npm/package.json').version")
          TAG="${{ steps.ver.outputs.version }}"
          if [ "$PKG" != "$TAG" ]; then
            echo "::error::npm/package.json version ($PKG) ≠ tag ($TAG)"
            echo "Bump the version in npm/package.json before tagging."
            exit 1
          fi
          echo "✓ version match: $PKG"

  # ── Build ────────────────────────────────────────────────────────────────────
  build:
    needs: guard
    uses: ./.github/workflows/build-wasm.yml

  # ── Publish ──────────────────────────────────────────────────────────────────
  publish:
    needs: [ guard, build ]
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      # Re-run the build steps inline so we have a fresh working tree.
      # (workflow_call artefacts are not automatically available cross-job.)
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: Build WASM
        run: |
          wasm-pack build crates/mid-qr-wasm \
            --target web --release \
            --out-dir ../../npm/wasm \
            --out-name mid_qr_wasm

      - name: Fetch nimiq scanner
        run: |
          NIMIQ="https://raw.githubusercontent.com/nimiq/qr-scanner/master"
          mkdir -p npm/src/worker
          curl -fsSL "$NIMIQ/qr-scanner.min.js"        -o npm/src/worker/qr-scanner.min.js
          curl -fsSL "$NIMIQ/qr-scanner-worker.min.js" -o npm/src/worker/qr-scanner-worker.min.js

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'
          cache-dependency-path: npm/package-lock.json

      - name: Install + build TypeScript
        working-directory: npm
        run: |
          npm ci
          npm run build:ts

      - name: Publish
        working-directory: npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
