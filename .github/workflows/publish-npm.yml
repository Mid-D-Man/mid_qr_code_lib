name: Publish to npm

on:
  push:
    tags:
      - 'v[0-9]*'

jobs:
  # ── Version guard ─────────────────────────────────────────────────────────────
  guard:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: ver
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Publishing: ${VERSION}"

      - name: Verify package.json matches tag
        run: |
          PKG=$(node -p "require('./npm/package.json').version")
          TAG="${{ steps.ver.outputs.version }}"
          if [ "$PKG" != "$TAG" ]; then
            echo "::error::npm/package.json version ($PKG) does not match tag ($TAG)"
            echo "Bump the version in npm/package.json before tagging."
            exit 1
          fi
          echo "version match: $PKG"

  # ── Build ─────────────────────────────────────────────────────────────────────
  build:
    needs: guard
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install wasm-pack
        run: |
          curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: Run tests
        run: cargo test -p mid-qr-core --features generate,decode

      - name: Build WASM
        run: |
          wasm-pack build crates/mid-qr-wasm \
            --target web \
            --release \
            --out-dir ../../npm/wasm \
            --out-name mid_qr_wasm

      - name: Fetch nimiq scanner
        run: |
          NIMIQ="https://raw.githubusercontent.com/nimiq/qr-scanner/master"
          mkdir -p npm/src/worker
          curl -fsSL "$NIMIQ/qr-scanner.min.js"        -o npm/src/worker/qr-scanner.min.js
          curl -fsSL "$NIMIQ/qr-scanner-worker.min.js" -o npm/src/worker/qr-scanner-worker.min.js

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'
          cache-dependency-path: npm/package-lock.json

      - name: Install npm dependencies
        working-directory: npm
        run: npm ci

      - name: Build TypeScript
        working-directory: npm
        run: npm run build:ts

      # ── Publish ───────────────────────────────────────────────────────────────
      - name: Publish to npm
        working-directory: npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
