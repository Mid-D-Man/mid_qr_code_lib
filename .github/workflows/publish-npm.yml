name: Publish to npm

on:
  push:
    tags:
      - 'v[0-9]*'

jobs:
  guard:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: ver
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Publishing: $VERSION"

      - name: Verify npm/package.json version matches tag
        run: |
          PKG=$(node -p "require('./npm/package.json').version")
          TAG="${{ steps.ver.outputs.version }}"
          if [ "$PKG" != "$TAG" ]; then
            echo "::error::npm/package.json version ($PKG) != tag ($TAG)"
            exit 1
          fi
          echo "version match: $PKG"

  build:
    needs: guard
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install wasm-pack
        run: |
          curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - name: Cache Rust build artefacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      - name: Run mid-qr-core tests
        run: cargo test -p mid-qr-core --features generate,decode

      - name: Build WASM (release, web target)
        run: |
          wasm-pack build crates/mid-qr-wasm \
            --target web \
            --release \
            --out-dir ../../npm/wasm \
            --out-name mid_qr_wasm

      - name: Install binaryen (wasm-opt)
        run: |
          sudo apt-get install -y binaryen
          wasm-opt --version

      - name: Optimise WASM with full proposal support
        run: |
          wasm-opt npm/wasm/mid_qr_wasm_bg.wasm \
            -Oz \
            --enable-bulk-memory \
            --enable-nontrapping-float-to-int \
            --enable-sign-ext \
            --enable-mutable-globals \
            -o npm/wasm/mid_qr_wasm_bg.wasm
          echo "wasm-opt done ($(du -sh npm/wasm/mid_qr_wasm_bg.wasm | cut -f1))"

      - name: Verify WASM artefacts
        run: |
          for f in npm/wasm/mid_qr_wasm_bg.wasm npm/wasm/mid_qr_wasm.js npm/wasm/mid_qr_wasm.d.ts; do
            if [ ! -f "$f" ]; then
              echo "::error::Missing: $f"
              exit 1
            fi
            echo "OK $f ($(du -sh "$f" | cut -f1))"
          done

      - name: Fetch nimiq scanner files
        run: |
          NIMIQ="https://raw.githubusercontent.com/nimiq/qr-scanner/master"
          mkdir -p npm/src/worker
          curl -fsSL "$NIMIQ/qr-scanner.min.js"        -o npm/src/worker/qr-scanner.min.js
          curl -fsSL "$NIMIQ/qr-scanner-worker.min.js" -o npm/src/worker/qr-scanner-worker.min.js
          echo "nimiq scanner files fetched"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'
          cache-dependency-path: npm/package-lock.json

      - name: Install and build TypeScript
        working-directory: npm
        run: |
          npm ci
          npm run build:ts

      - name: Verify TS build output
        run: |
          for f in npm/dist/index.js npm/dist/index.d.ts; do
            if [ ! -f "$f" ]; then
              echo "::error::Missing: $f"
              exit 1
            fi
            echo "OK $f"
          done

      - name: Upload npm package artefact
        uses: actions/upload-artifact@v4
        with:
          name: npm-package
          path: |
            npm/dist/
            npm/wasm/
            npm/src/worker/
            npm/package.json
            npm/package-lock.json
          retention-days: 1

  publish:
    needs: [ guard, build ]
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Download npm package artefact
        uses: actions/download-artifact@v4
        with:
          name: npm-package
          path: npm-publish/

      - name: Prepare publish layout
        run: |
          mkdir -p npm-publish/worker
          cp npm-publish/src/worker/*.js npm-publish/worker/ 2>/dev/null || true
          echo "Publish contents:"
          find npm-publish -type f | sort

      - name: Publish to npm
        working-directory: npm-publish
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
