# =============================================================================
# pages.yml
#
# Deploys the test/index.html app to GitHub Pages so the library can be
# tested in a real browser without any local setup.
#
# Live URL after setup:
#   https://mid-d-man.github.io/mid-qr/
#
# GitHub Pages setup (one-time, done in the repo web UI):
#   Settings → Pages → Source → "Deploy from a branch"
#   Branch: gh-pages   Folder: / (root)
# =============================================================================

name: Deploy test app to GitHub Pages

on:
  push:
    branches: [ main, master ]
    paths:
      - 'test/**'
      - 'crates/**'
      - 'npm/**'
      - 'wrappers/blazor/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to push gh-pages branch

    steps:
      - uses: actions/checkout@v4

      # ── Build WASM ────────────────────────────────────────────────────────
      - name: Install Rust + wasm-pack
        run: |
          rustup target add wasm32-unknown-unknown
          curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: Build WASM
        run: |
          wasm-pack build crates/mid-qr-wasm \
            --target web --release \
            --out-dir ../../npm/wasm \
            --out-name mid_qr_wasm

      # ── Fetch nimiq ───────────────────────────────────────────────────────
      - name: Fetch nimiq scanner
        run: |
          NIMIQ="https://raw.githubusercontent.com/nimiq/qr-scanner/master"
          mkdir -p npm/src/worker
          curl -fsSL "$NIMIQ/qr-scanner.min.js"        -o npm/src/worker/qr-scanner.min.js
          curl -fsSL "$NIMIQ/qr-scanner-worker.min.js" -o npm/src/worker/qr-scanner-worker.min.js

      # ── Build TypeScript ──────────────────────────────────────────────────
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: npm/package-lock.json

      - name: Build npm package
        working-directory: npm
        run: |
          npm ci
          npm run build:ts

      # ── Assemble gh-pages tree ────────────────────────────────────────────
      # The test page loads WASM and JS from relative paths, so we put
      # everything under one directory.
      #
      #   gh-pages-out/
      #     index.html         ← test app entry point
      #     wasm/              ← WASM binary + JS glue
      #     js/                ← built npm TS + nimiq worker
      - name: Assemble GitHub Pages output
        run: |
          rm -rf gh-pages-out
          mkdir -p gh-pages-out/wasm gh-pages-out/js/worker

          # Test app
          cp test/index.html gh-pages-out/index.html

          # WASM
          cp npm/wasm/mid_qr_wasm_bg.wasm  gh-pages-out/wasm/
          cp npm/wasm/mid_qr_wasm.js       gh-pages-out/wasm/

          # Built JS
          cp npm/dist/index.js             gh-pages-out/js/mid-qr.js

          # nimiq worker (must be accessible from JS worker scope)
          cp npm/src/worker/qr-scanner.min.js          gh-pages-out/js/worker/
          cp npm/src/worker/qr-scanner-worker.min.js   gh-pages-out/js/worker/

          echo "✓ Pages tree:"
          find gh-pages-out -type f | sort

      # ── Push to gh-pages ──────────────────────────────────────────────────
      - name: Deploy to gh-pages branch
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git fetch origin gh-pages 2>/dev/null || true
          git checkout --orphan gh-pages-tmp

          git rm -rf . --quiet 2>/dev/null || true
          cp -r gh-pages-out/. .
          rm -rf gh-pages-out

          git add .
          git diff --staged --quiet && echo "nothing changed" && exit 0

          git commit -m "deploy: gh-pages $(date -u '+%Y-%m-%dT%H:%M:%SZ') [skip ci]"
          git push origin HEAD:gh-pages --force
          echo "✓ deployed to gh-pages"
