name: Deploy test app to GitHub Pages

on:
  push:
    branches: [ main, master ]
    paths:
      - 'test/**'
      - 'crates/**'
      - 'npm/**'
      - 'wrappers/blazor/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install wasm-pack
        run: |
          curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - name: Cache Rust build artefacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      - name: Build WASM (release, web target)
        run: |
          wasm-pack build crates/mid-qr-wasm \
            --target web \
            --release \
            --out-dir ../../npm/wasm \
            --out-name mid_qr_wasm

      - name: Install binaryen (wasm-opt)
        run: |
          sudo apt-get install -y binaryen
          wasm-opt --version

      - name: Optimise WASM with full proposal support
        run: |
          wasm-opt npm/wasm/mid_qr_wasm_bg.wasm \
            -Oz \
            --enable-bulk-memory \
            --enable-nontrapping-float-to-int \
            --enable-sign-ext \
            --enable-mutable-globals \
            -o npm/wasm/mid_qr_wasm_bg.wasm
          echo "wasm-opt done ($(du -sh npm/wasm/mid_qr_wasm_bg.wasm | cut -f1))"

      - name: Verify WASM artefacts
        run: |
          for f in npm/wasm/mid_qr_wasm_bg.wasm npm/wasm/mid_qr_wasm.js npm/wasm/mid_qr_wasm.d.ts; do
            if [ ! -f "$f" ]; then
              echo "::error::Missing: $f"
              exit 1
            fi
            echo "OK $f ($(du -sh "$f" | cut -f1))"
          done

      - name: Fetch nimiq scanner files
        run: |
          NIMIQ="https://raw.githubusercontent.com/nimiq/qr-scanner/master"
          mkdir -p npm/src/worker
          curl -fsSL "$NIMIQ/qr-scanner.min.js"        -o npm/src/worker/qr-scanner.min.js
          curl -fsSL "$NIMIQ/qr-scanner-worker.min.js" -o npm/src/worker/qr-scanner-worker.min.js
          echo "nimiq scanner files fetched"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install and build TypeScript
        working-directory: npm
        run: |
          npm install
          npm run build:ts

      - name: Verify TS build output
        run: |
          for f in npm/dist/index.js npm/dist/index.d.ts; do
            if [ ! -f "$f" ]; then
              echo "::error::Missing: $f"
              exit 1
            fi
            echo "OK $f"
          done

      - name: Ensure test/index.html exists
        run: |
          mkdir -p test
          if [ ! -f "test/index.html" ]; then
            echo "test/index.html not found — writing placeholder"
            cat > test/index.html << 'HTMLEOF'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>mid-qr test</title>
            <style>
              body { font-family: system-ui, sans-serif; background: #0f172a; color: #f1f5f9;
                     display: flex; flex-direction: column; align-items: center;
                     justify-content: center; min-height: 100vh; margin: 0; gap: 16px; }
              h1   { color: #38bdf8; }
              p    { color: #94a3b8; }
              #qr  { min-height: 120px; min-width: 120px; background: #1e293b;
                     border-radius: 8px; display: flex; align-items: center;
                     justify-content: center; padding: 12px; }
              .badge { padding: 3px 10px; border-radius: 20px; font-size: 0.75rem;
                       font-weight: 600; background: #1e293b; color: #94a3b8; }
              .ok    { background: rgba(74,222,128,.15); color: #4ade80; }
              .err   { background: rgba(248,113,113,.15); color: #f87171; }
            </style>
          </head>
          <body>
            <h1>mid-qr <span class="badge" id="badge">loading…</span></h1>
            <p>Commit <code>test/index.html</code> from the repo source for the full test app.</p>
            <div id="qr"><span style="color:#475569">QR appears here</span></div>
            <script type="module">
              const wasmUrl = new URL('./wasm/mid_qr_wasm_bg.wasm', location.href);
              try {
                const { MidQr } = await import('./js/mid-qr.js');
                const qr  = await MidQr.create(wasmUrl);
                const svg = qr.generate({ data: location.href, size: 240 });
                document.getElementById('qr').innerHTML = svg;
                const b = document.getElementById('badge');
                b.textContent = 'v' + qr.version;
                b.className = 'badge ok';
              } catch (e) {
                const b = document.getElementById('badge');
                b.textContent = 'error';
                b.className = 'badge err';
                console.error(e);
              }
            </script>
          </body>
          </html>
          HTMLEOF
            echo "placeholder written"
          else
            echo "test/index.html exists — using repo version"
          fi

      - name: Assemble GitHub Pages output
        run: |
          rm -rf gh-pages-out
          mkdir -p gh-pages-out/wasm gh-pages-out/js/worker
          cp test/index.html                           gh-pages-out/index.html
          cp npm/wasm/mid_qr_wasm_bg.wasm             gh-pages-out/wasm/
          cp npm/wasm/mid_qr_wasm.js                  gh-pages-out/wasm/
          cp npm/dist/index.js                         gh-pages-out/js/mid-qr.js
          cp npm/src/worker/qr-scanner.min.js          gh-pages-out/js/worker/
          cp npm/src/worker/qr-scanner-worker.min.js   gh-pages-out/js/worker/
          touch gh-pages-out/.nojekyll
          echo "Pages tree:"
          find gh-pages-out -type f | sort

      - name: Deploy to gh-pages branch
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin gh-pages 2>/dev/null || true
          git checkout --orphan gh-pages-tmp
          git rm -rf . --quiet 2>/dev/null || true
          cp -r gh-pages-out/. .
          rm -rf gh-pages-out
          git add .
          if git diff --staged --quiet; then
            echo "nothing changed"
            exit 0
          fi
          git commit -m "deploy: gh-pages $(date -u '+%Y-%m-%dT%H:%M:%SZ') [skip ci]"
          git push origin HEAD:gh-pages --force
          echo "deployed to gh-pages"
