name: Deploy test app to GitHub Pages

on:
  push:
    branches: [ main, master ]
    paths:
      - 'test/**'
      - 'crates/**'
      - 'npm/**'
      - 'wrappers/blazor/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install wasm-pack
        run: |
          curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - name: Cache Rust build artefacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      - name: Build WASM (release, web target)
        run: |
          wasm-pack build crates/mid-qr-wasm \
            --target web \
            --release \
            --out-dir ../../npm/wasm \
            --out-name mid_qr_wasm

      - name: Install binaryen (wasm-opt)
        run: |
          sudo apt-get install -y binaryen
          wasm-opt --version

      - name: Optimise WASM with full proposal support
        run: |
          wasm-opt npm/wasm/mid_qr_wasm_bg.wasm \
            -Oz \
            --enable-bulk-memory \
            --enable-nontrapping-float-to-int \
            --enable-sign-ext \
            --enable-mutable-globals \
            -o npm/wasm/mid_qr_wasm_bg.wasm
          echo "wasm-opt done ($(du -sh npm/wasm/mid_qr_wasm_bg.wasm | cut -f1))"

      - name: Verify WASM artefacts
        run: |
          for f in npm/wasm/mid_qr_wasm_bg.wasm npm/wasm/mid_qr_wasm.js npm/wasm/mid_qr_wasm.d.ts; do
            if [ ! -f "$f" ]; then
              echo "::error::Missing: $f"
              exit 1
            fi
            echo "OK $f ($(du -sh "$f" | cut -f1))"
          done

      - name: Fetch nimiq scanner files
        run: |
          NIMIQ="https://raw.githubusercontent.com/nimiq/qr-scanner/master"
          mkdir -p npm/src/worker
          curl -fsSL "$NIMIQ/qr-scanner.min.js"        -o npm/src/worker/qr-scanner.min.js
          curl -fsSL "$NIMIQ/qr-scanner-worker.min.js" -o npm/src/worker/qr-scanner-worker.min.js
          echo "nimiq scanner files fetched"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: npm/package-lock.json

      - name: Install and build TypeScript
        working-directory: npm
        run: |
          npm ci
          npm run build:ts

      - name: Verify TS build output
        run: |
          for f in npm/dist/index.js npm/dist/index.d.ts; do
            if [ ! -f "$f" ]; then
              echo "::error::Missing: $f"
              exit 1
            fi
            echo "OK $f"
          done

      - name: Assemble GitHub Pages output
        run: |
          rm -rf gh-pages-out
          mkdir -p gh-pages-out/wasm gh-pages-out/js/worker
          cp test/index.html                                     gh-pages-out/index.html
          cp npm/wasm/mid_qr_wasm_bg.wasm                       gh-pages-out/wasm/
          cp npm/wasm/mid_qr_wasm.js                            gh-pages-out/wasm/
          cp npm/dist/index.js                                   gh-pages-out/js/mid-qr.js
          cp npm/src/worker/qr-scanner.min.js                   gh-pages-out/js/worker/
          cp npm/src/worker/qr-scanner-worker.min.js            gh-pages-out/js/worker/
          touch gh-pages-out/.nojekyll
          echo "Pages tree:"
          find gh-pages-out -type f | sort

      - name: Deploy to gh-pages branch
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin gh-pages 2>/dev/null || true
          git checkout --orphan gh-pages-tmp
          git rm -rf . --quiet 2>/dev/null || true
          cp -r gh-pages-out/. .
          rm -rf gh-pages-out
          git add .
          if git diff --staged --quiet; then
            echo "nothing changed"
            exit 0
          fi
          git commit -m "deploy: gh-pages $(date -u '+%Y-%m-%dT%H:%M:%SZ') [skip ci]"
          git push origin HEAD:gh-pages --force
          echo "deployed to gh-pages"
