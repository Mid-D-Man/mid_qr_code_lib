name: Deploy test app to GitHub Pages

on:
  push:
    branches: [ main, master ]
    paths:
      - 'test/**'
      - 'crates/**'
      - 'npm/**'
      - 'wrappers/blazor/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      # ── Rust + wasm-pack ──────────────────────────────────────────────────────
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install wasm-pack
        run: |
          curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: Build WASM
        run: |
          wasm-pack build crates/mid-qr-wasm \
            --target web \
            --release \
            --out-dir ../../npm/wasm \
            --out-name mid_qr_wasm

      # ── Nimiq scanner ─────────────────────────────────────────────────────────
      - name: Fetch nimiq scanner
        run: |
          NIMIQ="https://raw.githubusercontent.com/nimiq/qr-scanner/master"
          mkdir -p npm/src/worker
          curl -fsSL "$NIMIQ/qr-scanner.min.js"        -o npm/src/worker/qr-scanner.min.js
          curl -fsSL "$NIMIQ/qr-scanner-worker.min.js" -o npm/src/worker/qr-scanner-worker.min.js

      # ── TypeScript ────────────────────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: npm/package-lock.json

      - name: Install + build
        working-directory: npm
        run: |
          npm ci
          npm run build:ts

      # ── Assemble gh-pages tree ────────────────────────────────────────────────
      - name: Assemble GitHub Pages output
        run: |
          rm -rf gh-pages-out
          mkdir -p gh-pages-out/wasm gh-pages-out/js/worker

          cp test/index.html                           gh-pages-out/index.html
          cp npm/wasm/mid_qr_wasm_bg.wasm              gh-pages-out/wasm/
          cp npm/wasm/mid_qr_wasm.js                   gh-pages-out/wasm/
          cp npm/dist/index.js                         gh-pages-out/js/mid-qr.js
          cp npm/src/worker/qr-scanner.min.js          gh-pages-out/js/worker/
          cp npm/src/worker/qr-scanner-worker.min.js   gh-pages-out/js/worker/

          echo "Pages tree:"
          find gh-pages-out -type f | sort

      # ── Push to gh-pages branch ───────────────────────────────────────────────
      - name: Deploy to gh-pages
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git fetch origin gh-pages 2>/dev/null || true
          git checkout --orphan gh-pages-tmp

          git rm -rf . --quiet 2>/dev/null || true

          cp -r gh-pages-out/. .
          rm -rf gh-pages-out

          git add .

          if git diff --staged --quiet; then
            echo "nothing changed — gh-pages is already up to date"
            exit 0
          fi

          TIMESTAMP=$(date -u '+%Y-%m-%dT%H:%M:%SZ')
          git commit -m "deploy: gh-pages ${TIMESTAMP} [skip ci]"
          git push origin HEAD:gh-pages --force
          echo "deployed to gh-pages"
