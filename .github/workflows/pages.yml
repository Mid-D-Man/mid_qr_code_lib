name: Deploy test app to GitHub Pages

on:
  push:
    branches: [ main, master ]
    paths:
      - 'test/**'
      - 'crates/**'
      - 'npm/**'
      - 'wrappers/blazor/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      # ── Rust toolchain ────────────────────────────────────────────────────────
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      # ── wasm-pack ─────────────────────────────────────────────────────────────
      - name: Install wasm-pack
        run: |
          curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      # ── Rust cache ────────────────────────────────────────────────────────────
      - name: Cache Rust build artefacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      # ── Build WASM ────────────────────────────────────────────────────────────
      # --enable-bulk-memory is passed via Cargo.toml metadata so wasm-opt
      # accepts memory.fill / memory.copy instructions from rxing/encoding_rs.
      - name: Build WASM (release, web target)
        run: |
          wasm-pack build crates/mid-qr-wasm \
            --target web \
            --release \
            --out-dir ../../npm/wasm \
            --out-name mid_qr_wasm

      # ── Verify WASM ───────────────────────────────────────────────────────────
      - name: Verify WASM artefacts
        run: |
          for f in npm/wasm/mid_qr_wasm_bg.wasm \
                   npm/wasm/mid_qr_wasm.js \
                   npm/wasm/mid_qr_wasm.d.ts; do
            [ -f "$f" ] || { echo "::error::Missing: $f"; exit 1; }
            echo "✓ $f ($(du -sh "$f" | cut -f1))"
          done

      # ── Fetch nimiq scanner ───────────────────────────────────────────────────
      - name: Fetch nimiq scanner files
        run: |
          NIMIQ="https://raw.githubusercontent.com/nimiq/qr-scanner/master"
          mkdir -p npm/src/worker
          curl -fsSL "$NIMIQ/qr-scanner.min.js"        -o npm/src/worker/qr-scanner.min.js
          curl -fsSL "$NIMIQ/qr-scanner-worker.min.js" -o npm/src/worker/qr-scanner-worker.min.js
          echo "✓ nimiq scanner files fetched"

      # ── Node.js ───────────────────────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: npm/package-lock.json

      # ── Build TypeScript ──────────────────────────────────────────────────────
      - name: Install + build TypeScript
        working-directory: npm
        run: |
          npm ci
          npm run build:ts

      # ── Verify TS output ──────────────────────────────────────────────────────
      - name: Verify TS build output
        run: |
          for f in npm/dist/index.js npm/dist/index.d.ts; do
            [ -f "$f" ] || { echo "::error::Missing: $f"; exit 1; }
            echo "✓ $f"
          done

      # ── Assemble GitHub Pages output ──────────────────────────────────────────
      # Tree layout:
      #   gh-pages-out/
      #     index.html            ← test app
      #     wasm/                 ← WASM binary + JS glue
      #     js/
      #       mid-qr.js           ← compiled npm bundle (single ES module)
      #       worker/             ← nimiq scanner files
      #
      # All paths are relative so the test app works at any base URL.
      - name: Assemble GitHub Pages output
        run: |
          rm -rf gh-pages-out
          mkdir -p gh-pages-out/wasm gh-pages-out/js/worker

          # Test app entry point
          cp test/index.html gh-pages-out/index.html

          # WASM binary and JS glue
          cp npm/wasm/mid_qr_wasm_bg.wasm  gh-pages-out/wasm/
          cp npm/wasm/mid_qr_wasm.js       gh-pages-out/wasm/

          # Compiled TS bundle — exposed as a single ES module
          cp npm/dist/index.js             gh-pages-out/js/mid-qr.js

          # nimiq worker — must be in a path accessible from the JS worker scope
          cp npm/src/worker/qr-scanner.min.js          gh-pages-out/js/worker/
          cp npm/src/worker/qr-scanner-worker.min.js   gh-pages-out/js/worker/

          echo "✓ Pages tree:"
          find gh-pages-out -type f | sort

      # ── Push to gh-pages branch ───────────────────────────────────────────────
      - name: Deploy to gh-pages branch
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git fetch origin gh-pages 2>/dev/null || true
          git checkout --orphan gh-pages-tmp

          git rm -rf . --quiet 2>/dev/null || true
          cp -r gh-pages-out/. .
          rm -rf gh-pages-out

          # Required by GitHub Pages — tells it not to run Jekyll
          touch .nojekyll

          git add .
          if git diff --staged --quiet; then
            echo "nothing changed — gh-pages already up to date"
            exit 0
          fi

          git commit -m "deploy: gh-pages $(date -u '+%Y-%m-%dT%H:%M:%SZ') [skip ci]"
          git push origin HEAD:gh-pages --force
          echo "✓ deployed to gh-pages"
          echo "Live at: https://mid-d-man.github.io/mid-qr/"
